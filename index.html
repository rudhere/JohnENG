<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENG - JOHN PRO | Plataforma de Engenharia</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#020617;color:#f1f5f9;min-height:100vh}
::selection{background:#06b6d4;color:#020617}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#1e293b}
::-webkit-scrollbar-thumb{background:#475569;border-radius:3px}
.app{display:flex;flex-direction:column;min-height:100vh}
@media(min-width:768px){.app{flex-direction:row}}
.sidebar{width:100%;background:#0f172a;border-right:1px solid #1e293b;display:flex;flex-direction:column;justify-content:space-between}
@media(min-width:768px){.sidebar{width:16rem}}
.sidebar-logo{padding:1.25rem;border-bottom:1px solid #1e293b;display:flex;align-items:center;justify-content:space-between}
.logo-mark{background:#06b6d4;color:#020617;padding:.375rem;border-radius:.5rem;font-weight:900;font-size:.875rem;letter-spacing:.1em;display:flex;align-items:center;gap:2px}
.logo-mark-inner{background:#020617;color:#22d3ee;padding:0 .25rem;border-radius:.25rem;font-size:.75rem}
.logo-text{font-weight:800;color:#fff;letter-spacing:-.025em;font-size:1.125rem}
.nav{padding:1rem;display:flex;flex-direction:column;gap:.25rem}
.nav-btn{width:100%;display:flex;align-items:center;gap:.75rem;padding:.625rem .75rem;border-radius:.75rem;font-size:.75rem;font-weight:600;border:none;cursor:pointer;background:transparent;color:#94a3b8;transition:all .15s;text-align:left}
.nav-btn:hover{color:#e2e8f0;background:rgba(30,41,59,.4)}
.nav-btn.active{background:rgba(6,182,212,.1);color:#22d3ee;border:1px solid rgba(6,182,212,.2)}
.compliance{padding:1rem;border-top:1px solid #1e293b;background:rgba(2,6,23,.4);font-size:10px;color:#64748b}
.compliance p:first-child{font-weight:700;color:#94a3b8}
.main{flex:1;display:flex;flex-direction:column;overflow-x:hidden;position:relative}
.topbar{background:rgba(15,23,42,.6);border-bottom:1px solid #1e293b;padding:1rem 1.5rem;display:flex;flex-direction:column;gap:1rem}
@media(min-width:1024px){.topbar{flex-direction:row;align-items:center;justify-content:space-between}}
.topbar-left{flex:1}
.topbar-title{display:flex;align-items:center;gap:.75rem}
.topbar-title h2{font-size:1.25rem;font-weight:800;color:#fff}
.topbar-title h2 span{color:#22d3ee;font-size:.875rem;font-weight:500}
.btn-edit-project{background:#1e293b;border:1px solid #334155;color:#e2e8f0;font-size:.75rem;padding:.25rem .625rem;border-radius:.5rem;cursor:pointer;display:flex;align-items:center;gap:.375rem;transition:all .15s}
.btn-edit-project:hover{background:#334155}
.topbar-sub{font-size:.75rem;color:#94a3b8;margin-top:.25rem}
.topbar-sub span{color:#e2e8f0}
.topbar-kpis{display:flex;flex-wrap:wrap;gap:.75rem}
.kpi-card{background:#0f172a;border:1px solid #1e293b;padding:.375rem .75rem;border-radius:.5rem;text-align:center;min-width:120px}
.kpi-label{display:block;font-size:9px;color:#94a3b8;text-transform:uppercase;font-weight:700}
.kpi-value{font-size:.875rem;font-weight:800;font-family:"Courier New",monospace}
.kpi-cyan{color:#22d3ee}
.kpi-purple{color:#a78bfa}
.kpi-green{color:#34d399}
.edit-panel{background:rgba(15,23,42,.95);border-bottom:1px solid #1e293b;padding:1.5rem;position:absolute;top:4rem;left:0;right:0;z-index:50;backdrop-filter:blur(8px);box-shadow:0 25px 50px rgba(0,0,0,.5)}
.edit-header{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1e293b;padding-bottom:.75rem}
.edit-header h3{font-size:.875rem;font-weight:700;color:#22d3ee;display:flex;align-items:center;gap:.5rem}
.btn-close-panel{background:transparent;color:#94a3b8;border:none;cursor:pointer;font-size:.75rem;padding:.25rem .5rem;border-radius:.25rem}
.btn-close-panel:hover{color:#fff}
.edit-grid{display:grid;grid-template-columns:1fr;gap:1rem;margin-top:1rem;font-size:.75rem}
@media(min-width:768px){.edit-grid{grid-template-columns:repeat(4,1fr)}}
.edit-grid label{display:block;color:#94a3b8;margin-bottom:.25rem;font-weight:600}
.edit-grid input{width:100%;background:#020617;border:1px solid #1e293b;border-radius:.25rem;padding:.5rem;color:#f1f5f9;font-weight:500}
.edit-grid input:focus{border-color:#06b6d4;outline:none}
.btn-save{width:100%;background:#06b6d4;color:#020617;font-weight:700;border:none;padding:.5rem;border-radius:.5rem;font-size:.75rem;cursor:pointer}
.btn-save:hover{background:#0891b2}
.content{padding:1.5rem;max-width:1280px;width:100%;margin:0 auto;flex:1}
.card{background:#0f172a;border:1px solid #1e293b;border-radius:.75rem;padding:1.25rem}
.card-title{font-size:.875rem;font-weight:800;color:#fff;border-bottom:1px solid #1e293b;padding-bottom:.5rem;margin-bottom:1rem}
.card-title-flex{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1e293b;padding-bottom:.5rem;margin-bottom:1rem}
.badge-crossed{font-size:10px;background:rgba(6,182,212,.2);color:#22d3ee;padding:.125rem .625rem;border-radius:9999px;font-weight:700}
.input-field{width:100%;background:#020617;border:1px solid #1e293b;border-radius:.5rem;padding:.5rem;color:#e2e8f0;font-size:.75rem}
.input-field:focus{border-color:#06b6d4;outline:none}
.input-mono{font-family:"Courier New",monospace}
.select-field{width:100%;background:#020617;border:1px solid #1e293b;border-radius:.5rem;padding:.5rem;color:#cbd5e1;font-size:.75rem}
.select-field:focus{outline:none;border-color:#06b6d4}
.btn-cyan{background:#06b6d4;color:#020617;font-weight:700;border:none;padding:.375rem .75rem;border-radius:.25rem;font-size:11px;cursor:pointer;transition:background .15s}
.btn-cyan:hover{background:#0891b2}
.btn-cyan-sm{background:#06b6d4;color:#020617;font-weight:700;border:none;padding:.25rem .5rem;border-radius:.25rem;font-size:11px;cursor:pointer}
.schematic-box{background:#020617;border-radius:.5rem;border:1px solid #1e293b;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.schematic-label{position:absolute;left:.75rem;top:.75rem;background:#0f172a;border:1px solid #1e293b;font-size:9px;color:#94a3b8;padding:.125rem .375rem;border-radius:.25rem;font-family:"Courier New",monospace}
.schematic-vol{position:absolute;right:.75rem;bottom:.75rem;font-size:10px;color:#64748b;font-family:"Courier New",monospace}
.element-card{background:#020617;padding:.875rem;border-radius:.5rem;border:1px solid rgba(30,41,59,.8);display:flex;align-items:center;justify-content:space-between;gap:1rem;font-size:.75rem}
.element-tag{font-size:9px;background:#1e293b;color:#94a3b8;padding:.125rem .375rem;border-radius:.25rem;text-transform:uppercase;font-weight:600}
.btn-trash{color:#475569;background:none;border:none;cursor:pointer;padding:.25rem;transition:color .15s}
.btn-trash:hover{color:#f87171}
.engine-box{background:#0f172a;border:1px solid rgba(6,182,212,.2);border-radius:.75rem;padding:1.5rem;position:relative;overflow:hidden}
.engine-glow{position:absolute;right:0;top:0;width:6rem;height:6rem;background:linear-gradient(135deg,rgba(6,182,212,.05),transparent);border-radius:0 0 0 9999px}
.engine-title{font-size:.75rem;font-weight:700;color:#22d3ee;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.375rem}
.engine-text{font-size:.75rem;color:#cbd5e1;line-height:1.625;max-width:56rem}
.calc-grid{display:grid;grid-template-columns:1fr;gap:2rem}
@media(min-width:1024px){.calc-grid{grid-template-columns:repeat(2,1fr)}}
.calc-header{padding-bottom:.5rem;border-bottom:1px solid #1e293b;margin-bottom:1rem}
.calc-norm{font-size:10px;background:rgba(6,182,212,.1);border:1px solid #155e75;color:#22d3ee;padding:.125rem .5rem;border-radius:.25rem;font-weight:700;text-transform:uppercase}
.calc-label{display:block;color:#94a3b8;margin-bottom:.25rem}
.calc-input{width:100%;background:#020617;border:1px solid #1e293b;border-radius:.25rem;padding:.375rem;font-family:"Courier New",monospace;color:#e2e8f0}
.calc-input:focus{border-color:#06b6d4;outline:none}
.calc-suggestion{font-size:11px;color:#94a3b8}
.btn-add-pool{background:#06b6d4;color:#020617;font-weight:700;border:none;padding:.375rem .75rem;border-radius:.25rem;font-size:11px;cursor:pointer;transition:background .15s}
.btn-add-pool:hover{background:#0891b2}
footer{background:#0f172a;border-top:1px solid #1e293b;padding:1rem 1.5rem;text-align:center;font-size:.75rem;color:#64748b}
.footer-inner{max-width:1280px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:1rem}
@media(min-width:768px){.footer-inner{flex-direction:row;justify-content:space-between}}
.footer-meta{display:flex;gap:1rem;font-size:10px}
@media print{.no-print{display:none!important}}
.pdf-doc{background:#fff;color:#0f172a;padding:2rem;border-radius:1rem;max-width:56rem;margin:0 auto;box-shadow:0 25px 50px rgba(0,0,0,.5);border:1px solid #e2e8f0}
.pdf-table{width:100%;text-align:left;font-size:.75rem;border-collapse:collapse}
.pdf-table th{background:#f1f5f9;color:#475569;font-weight:700;border-bottom:1px solid #cbd5e1;padding:.5rem}
.pdf-table td{padding:.5rem;border-bottom:1px solid #e2e8f0}
.pdf-table tr:last-child td{border-bottom:2px solid #0f172a;font-weight:700}
.element-list{display:flex;flex-direction:column;gap:.75rem;max-height:18rem;overflow-y:auto;padding-right:.25rem}
.rpg{display:grid;grid-template-columns:1fr;gap:1.5rem}
.rgg,.rgm{display:grid;grid-template-columns:1fr;gap:2rem}
@media(min-width:1024px){.rpg{grid-template-columns:repeat(3,1fr)}.rgg{grid-template-columns:repeat(3,1fr)}.rgm{grid-template-columns:repeat(3,1fr)}}
/* New styles for tabbed calculators */
.calc-sub-nav{display:flex;flex-wrap:wrap;gap:.375rem;margin-bottom:1.5rem;border-bottom:1px solid #1e293b;padding-bottom:.75rem}
.calc-sub-btn{background:transparent;color:#94a3b8;border:1px solid #1e293b;padding:.375rem .625rem;border-radius:.5rem;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.calc-sub-btn:hover{color:#e2e8f0;background:rgba(30,41,59,.4)}
.calc-sub-btn.active{background:rgba(6,182,212,.1);color:#22d3ee;border-color:rgba(6,182,212,.3)}
.export-bar{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:1rem;padding-top:1rem;border-top:1px solid #1e293b}
.btn-export{background:#1e293b;color:#94a3b8;border:1px solid #334155;padding:.375rem .625rem;border-radius:.375rem;font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:.375rem}
.btn-export:hover{background:#334155;color:#e2e8f0}
.btn-export-cyan{background:rgba(6,182,212,.1);color:#22d3ee;border:1px solid rgba(6,182,212,.2)}
.btn-export-cyan:hover{background:rgba(6,182,212,.2);color:#22d3ee}
/* Cross ref section */
.cross-ref{background:rgba(6,182,212,.05);border:1px solid rgba(6,182,212,.15);border-radius:.5rem;padding:.75rem;margin-top:1rem;font-size:11px}
.cross-ref-title{font-size:10px;font-weight:700;color:#22d3ee;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem;display:flex;align-items:center;gap:.375rem}
.cross-grid{display:grid;grid-template-columns:1fr 1fr;gap:.375rem}
@media(min-width:768px){.cross-grid{grid-template-columns:repeat(3,1fr)}}
.cross-item{padding:.375rem;background:rgba(2,6,23,.4);border-radius:.25rem}
.cross-item-label{color:#94a3b8;font-size:9px;display:block}
.cross-item-value{font-weight:700;color:#f1f5f9;font-family:"Courier New",monospace}
.cross-item-cost{color:#34d399;font-size:9px}
/* IA Module */
.ia-card{background:#0f172a;border:1px solid rgba(6,182,212,.2);border-radius:.75rem;padding:1.5rem}
.ia-textarea{width:100%;min-height:120px;background:#020617;border:1px solid #1e293b;border-radius:.5rem;padding:.75rem;color:#e2e8f0;font-size:.75rem;font-family:"Courier New",monospace;resize:vertical}
.ia-textarea:focus{border-color:#06b6d4;outline:none}
.ia-suggestion{background:#020617;border:1px solid #1e293b;border-radius:.5rem;padding:1rem;margin-top:1rem;font-size:.75rem}
.ia-suggestion h4{color:#22d3ee;font-size:.75rem;font-weight:700;margin-bottom:.5rem;border-bottom:1px solid #1e293b;padding-bottom:.375rem}
.ia-suggestion p{margin:.25rem 0;color:#cbd5e1}
.ia-suggestion strong{color:#f1f5f9}
.ia-badge{display:inline-block;font-size:9px;background:rgba(6,182,212,.1);color:#22d3ee;padding:.125rem .375rem;border-radius:.25rem;font-weight:700;margin-left:.375rem}
/* Arquitetura Recomendada */
.arch-flow{display:flex;flex-wrap:wrap;gap:.5rem;align-items:center;justify-content:center;padding:1.5rem;background:#020617;border-radius:.75rem;border:1px solid #1e293b;margin:1rem 0}
.arch-flow-box{background:#0f172a;border:1px solid rgba(6,182,212,.2);padding:.5rem 1rem;border-radius:.5rem;font-size:11px;font-weight:600;color:#22d3ee;text-align:center}
.arch-flow-arrow{color:#475569;font-size:1.25rem}
@media(max-width:600px){.arch-flow-arrow{display:none}.arch-flow{gap:1rem}}
.db-table{width:100%;font-size:11px;border-collapse:collapse;margin-top:.5rem}
.db-table th{background:#0f172a;color:#94a3b8;font-weight:700;border-bottom:1px solid #1e293b;padding:.375rem .5rem;text-align:left;font-size:10px;text-transform:uppercase}
.db-table td{padding:.375rem .5rem;border-bottom:1px solid rgba(30,41,59,.5);color:#cbd5e1}
.db-table tr:hover td{background:rgba(6,182,212,.03)}
.db-section{margin-bottom:1.25rem}
.db-section h4{font-size:.75rem;font-weight:700;color:#22d3ee;margin-bottom:.375rem;display:flex;align-items:center;gap:.375rem}
/* Result box */
.result-box{background:#020617;border:1px solid #1e293b;border-radius:.5rem;padding:.75rem;margin-top:.75rem}
.result-row{display:flex;justify-content:space-between;padding:.25rem 0;font-size:.75rem;border-bottom:1px solid rgba(30,41,59,.5)}
.result-row:last-child{border-bottom:none}
.result-label{color:#94a3b8}
.result-value{font-weight:700;color:#f1f5f9;font-family:"Courier New",monospace}
.result-highlight{color:#22d3ee}
.result-cost{color:#34d399}
/* Cronograma */
.cron-item{display:flex;justify-content:space-between;padding:.25rem .375rem;font-size:10px;border-bottom:1px solid rgba(30,41,59,.3)}
.cron-item:last-child{border-bottom:none}
.cron-label{color:#94a3b8}
.cron-value{font-weight:600;color:#e2e8f0}
/* ===== Database Editor ===== */
.db-edit-grid{display:grid;grid-template-columns:1fr;gap:1.5rem}
@media(min-width:768px){.db-edit-grid{grid-template-columns:1fr 1fr}}
.db-edit-card{background:#020617;border:1px solid #1e293b;border-radius:.5rem;padding:.75rem}
.db-edit-card h4{font-size:10px;font-weight:700;color:#22d3ee;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem;display:flex;align-items:center;gap:.375rem}
.db-edit-row{display:grid;grid-template-columns:1fr 60px 60px;gap:.375rem;align-items:center;margin-bottom:.375rem;font-size:11px}
.db-edit-row input{background:#0f172a;border:1px solid #1e293b;border-radius:.25rem;padding:.25rem .375rem;color:#e2e8f0;font-size:11px;font-family:"Courier New",monospace;width:100%}
.db-edit-row input:focus{border-color:#06b6d4;outline:none}
.db-edit-row span{color:#94a3b8;font-size:10px}
/* ===== Theme Toggle ===== */
.theme-bar{display:flex;gap:.25rem;padding:.5rem .75rem;flex-wrap:wrap}
.theme-btn{font-size:9px;padding:.25rem .5rem;border-radius:.375rem;border:1px solid #1e293b;background:transparent;color:#64748b;cursor:pointer;font-weight:600;transition:all .15s}
.theme-btn:hover{color:#e2e8f0;border-color:#475569}
.theme-btn.active{background:rgba(6,182,212,.1);color:#22d3ee;border-color:rgba(6,182,212,.3)}
/* ===== Theme: White ===== */
[data-theme="white"] body,
[data-theme="white"] .app{background:#f8fafc;color:#0f172a}
[data-theme="white"] .sidebar{background:#fff;border-color:#e2e8f0}
[data-theme="white"] .nav-btn{color:#64748b}
[data-theme="white"] .nav-btn:hover{background:#f1f5f9;color:#0f172a}
[data-theme="white"] .nav-btn.active{background:#ecfeff;color:#0891b2;border-color:#a5f3fc}
[data-theme="white"] .compliance{color:#94a3b8}
[data-theme="white"] .topbar{background:rgba(255,255,255,.8);border-color:#e2e8f0}
[data-theme="white"] .topbar-title h2{color:#0f172a}
[data-theme="white"] .btn-edit-project{background:#f1f5f9;border-color:#cbd5e1;color:#475569}
[data-theme="white"] .kpi-card{background:#fff;border-color:#e2e8f0}
[data-theme="white"] .card{background:#fff;border-color:#e2e8f0}
[data-theme="white"] .card-title{color:#0f172a;border-color:#e2e8f0}
[data-theme="white"] .input-field{background:#f8fafc;border-color:#cbd5e1;color:#0f172a}
[data-theme="white"] .select-field{background:#f8fafc;border-color:#cbd5e1;color:#0f172a}
[data-theme="white"] .engine-box{background:#fff;border-color:#e2e8f0}
[data-theme="white"] .engine-text{color:#475569}
[data-theme="white"] .calc-input{background:#f8fafc;border-color:#cbd5e1;color:#0f172a}
[data-theme="white"] .schematic-box{background:#f8fafc;border-color:#e2e8f0}
[data-theme="white"] .element-card{background:#f8fafc;border-color:#e2e8f0}
[data-theme="white"] .badge-crossed{background:#ecfeff;color:#0891b2}
[data-theme="white"] .calc-norm{background:#ecfeff;color:#0891b2;border-color:#a5f3fc}
[data-theme="white"] .db-edit-card{background:#f8fafc;border-color:#e2e8f0}
[data-theme="white"] .db-edit-row input{background:#fff;border-color:#cbd5e1;color:#0f172a}
[data-theme="white"] footer{background:#fff;border-color:#e2e8f0;color:#94a3b8}
/* ===== Theme: Noturno ===== */
[data-theme="noturno"] body,
[data-theme="noturno"] .app{background:#0a0a0a;color:#e0e0e0}
[data-theme="noturno"] .sidebar{background:#111;border-color:#222}
[data-theme="noturno"] .nav-btn{color:#888}
[data-theme="noturno"] .nav-btn:hover{background:#1a1a1a;color:#fbbf24}
[data-theme="noturno"] .nav-btn.active{background:rgba(251,191,36,.08);color:#fbbf24;border-color:rgba(251,191,36,.2)}
[data-theme="noturno"] .compliance{color:#666}
[data-theme="noturno"] .topbar{background:rgba(17,17,17,.8);border-color:#222}
[data-theme="noturno"] .topbar-title h2{color:#fbbf24}
[data-theme="noturno"] .btn-edit-project{background:#1a1a1a;border-color:#333;color:#aaa}
[data-theme="noturno"] .kpi-card{background:#111;border-color:#222}
[data-theme="noturno"] .kpi-cyan{color:#fbbf24}
[data-theme="noturno"] .kpi-green{color:#fbbf24}
[data-theme="noturno"] .kpi-purple{color:#fbbf24}
[data-theme="noturno"] .card{background:#111;border-color:#222}
[data-theme="noturno"] .card-title{color:#fbbf24;border-color:#222}
[data-theme="noturno"] .input-field{background:#0a0a0a;border-color:#333;color:#e0e0e0}
[data-theme="noturno"] .select-field{background:#0a0a0a;border-color:#333;color:#e0e0e0}
[data-theme="noturno"] .engine-box{background:#111;border-color:rgba(251,191,36,.15)}
[data-theme="noturno"] .engine-title{color:#fbbf24}
[data-theme="noturno"] .engine-text{color:#999}
[data-theme="noturno"] .calc-input{background:#0a0a0a;border-color:#333;color:#e0e0e0}
[data-theme="noturno"] .schematic-box{background:#0a0a0a;border-color:#222}
[data-theme="noturno"] .element-card{background:#0a0a0a;border-color:#222}
[data-theme="noturno"] .badge-crossed{background:rgba(251,191,36,.1);color:#fbbf24}
[data-theme="noturno"] .calc-norm{background:rgba(251,191,36,.1);color:#fbbf24;border-color:rgba(251,191,36,.2)}
[data-theme="noturno"] .db-edit-card{background:#0a0a0a;border-color:#222}
[data-theme="noturno"] .db-edit-row input{background:#111;border-color:#333;color:#e0e0e0}
[data-theme="noturno"] footer{background:#111;border-color:#222;color:#666}
[data-theme="noturno"] .btn-cyan{background:#fbbf24;color:#0a0a0a}
[data-theme="noturno"] .btn-cyan:hover{background:#f59e0b}
[data-theme="noturno"] .btn-add-pool{background:#fbbf24;color:#0a0a0a}
[data-theme="noturno"] .btn-add-pool:hover{background:#f59e0b}
[data-theme="noturno"] .btn-save{background:#fbbf24;color:#0a0a0a}
[data-theme="noturno"] .btn-save:hover{background:#f59e0b}

function getGalpaoTipo(){
  const {width:w,height:h,slope:s}=S.galpaoParams;
  if(s>35) return 'triangular';
  if(w/h>4 && s<=20) return 'arco';
  return 'retangular';
}
function getGalpaoCalc(){
  const p=S.galpaoParams;
  const a=p.width*p.length;
  const h=p.height, w=p.width;
  const tipo=getGalpaoTipo();
  const telhadoFactor = tipo==='retangular' ? 1.05 : tipo==='arco' ? 1.57 : tipo==='triangular' ? 1.12 : 1.05;
  const areaCobertura = a * telhadoFactor;
  const perimetroAprox = tipo==='retangular' ? 2*(w + Math.sqrt(w*w/4 + h*h))
    : tipo==='arco' ? Math.PI * (w/2 + h/2)
    : tipo==='triangular' ? 2*Math.sqrt(w*w/4 + h*h)
    : 2*(w + Math.sqrt(w*w/4 + h*h));
  const pesoAco = tipo==='retangular' ? a*24.5 : tipo==='arco' ? a*28.0 : tipo==='triangular' ? a*22.0 : a*24.5;
  const areaPintura = tipo==='retangular' ? perimetroAprox * p.length * 0.01
    : tipo==='arco' ? (Math.PI * (w/2 + h/2)) * p.length * 0.01
    : tipo==='triangular' ? (w + 2*Math.sqrt(w*w/4 + h*h)) * p.length * 0.01
    : perimetroAprox * p.length * 0.01;
  return {totalArea:a,steelWeight:pesoAco.toFixed(0),roofingArea:areaCobertura.toFixed(1),paintingArea:areaPintura.toFixed(1),boltsQty:Math.ceil(a*1.8),telhadoFactor};
}
function getSapataCalc(){

  return {requiredArea:ra.toFixed(2),suggestedSide:cs.toFixed(2),concreteVol:cv.toFixed(2),steelWeight:(cv*75).toFixed(1)};
}
function getPilarCalc(){

}

function getEscavacaoCalc(){

function getCoberturaCalc(){
  const rad = S.coberturaParams.inclinacao * Math.PI / 180;
  const areaReal = S.coberturaParams.areaProjetada / Math.cos(rad);

function getPinturaCalc(){

  return {tinta:t.nome,rendimento:t.rendimento,area:S.pinturaParams.area,litros:litros};

function getConcretoCalc(){
  const p = S.concretoParams;
  let cv = 0, sw = 0, esc = 0;
  if(p.tipo==='viga'){cv=p.comprimento*p.largura*p.altura;sw=cv*85;}
  else if(p.tipo==='pilar'){cv=p.altura*p.largura*p.altura_d||p.comprimento*p.largura*p.altura;sw=cv*95;}
  else if(p.tipo==='laje'){cv=p.area*p.espessura;sw=p.area*6.5;esc=Math.ceil(p.area*1.2);}
  else if(p.tipo==='bloco'){cv=p.comprimento*p.largura*p.altura;sw=cv*90;}
  else if(p.tipo==='cilindro'){cv=Math.PI*p.raio*p.raio*p.altura;sw=cv*85;}
  return {concreteVol:cv,steelWeight:sw,escoras:esc};
}
function getCrossCalc(concreteVol){
  const ref = databaseMateriais.concreto.ref;
  const cimento = concreteVol * ref.cimento;
  const areia = concreteVol * ref.areia;
  const brita = concreteVol * ref.brita;
  const aco = concreteVol * 100;
  const custoCimento = cimento * ref.custoCimento;
  const custoAreia = areia * ref.custoAreia;
  const custoBrita = brita * ref.custoBrita;
  const custoAco = aco * 11.20;
  const custoTotal = custoCimento + custoAreia + custoBrita + custoAco;
  const diasEscav = Math.max(1, Math.ceil(concreteVol / 1));
  const diasArm = Math.max(1, Math.ceil(aco / 150));
  const diasConc = Math.max(1, Math.ceil(concreteVol / 8));
  return {cimento,areia,brita,aco,custoCimento,custoAreia,custoBrita,custoAco,custoTotal,diasEscav,diasArm,diasConc};
}

function exportCopy(calcId, label){
  const el = document.getElementById(calcId);
  if(!el) return;
  const txt = label + '\n' + Array.from(el.querySelectorAll('.result-row')).map(r=>r.textContent.trim()).join('\n');
  navigator.clipboard.writeText(txt).then(()=>{
    const btn = document.querySelector('[data-copy="'+calcId+'"]');
    if(btn){btn.textContent='Copiado!';setTimeout(()=>{btn.innerHTML=icon('Copy')+' Copiar'},1500);}
  }).catch(()=>{alert('Erro ao copiar. Selecione manualmente.')});
}

  const rows = [['Item','Valor']];

    const label = r.querySelector('.result-label')?.textContent||'';
    const value = r.querySelector('.result-value')?.textContent||'';
    rows.push([label,value]);
  });
  const csv = '\uFEFF' + rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename + '.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

          {label:'Cronograma Estimado',valor:Math.ceil(concreto/8)+' dias concretagem, 60 dias alvenaria, 45 dias acabamento'}
        ]
      };
    } else {
      S.iaResult = {
        tipo: tipo || 'Personalizado',
        sugestoes:[
          {label:'Tipo',valor:d.tipo||'N/A'},
          {label:'Área',valor:d.area?d.area+' m²':'N/A'},

function galpaoSVG(tipo, w, h){
  const viewBox="0 0 100 100";
  const base='<rect x="8" y="85" width="84" height="3" rx="1" fill="#475569"/>';
  if(tipo==='arco'){
    const rx=Math.min(42,w/h*12+20),ry=Math.min(30,h/w*25+10);
    return `<svg style="width:12rem;height:12rem;color:#06b6d4" viewBox="${viewBox}" fill="none">
      ${base}
      <ellipse cx="50" cy="55" rx="${rx}" ry="${ry}" stroke="#06b6d4" stroke-width="2" fill="rgba(6,182,212,0.08)"/>
      <line x1="${50-rx}" y1="55" x2="${50-rx}" y2="85" stroke="#06b6d4" stroke-width="2"/>
      <line x1="${50+rx}" y1="55" x2="${50+rx}" y2="85" stroke="#06b6d4" stroke-width="2"/>
      <line x1="${50-rx}" y1="85" x2="${50+rx}" y2="85" stroke="#64748b" stroke-width="1" stroke-dasharray="2"/>
      <text x="50" y="${55-ry-4}" text-anchor="middle" fill="#22d3ee" font-size="6">h=${h}m</text>
      <text x="50" y="97" text-anchor="middle" fill="#64748b" font-size="5">L=${w}m</text>
      <circle cx="${50-rx+8}" cy="47" r="1" fill="#f43f5e"/>
      <circle cx="${50-rx+16}" cy="40" r="1" fill="#f43f5e"/>
      <circle cx="${50+rx-8}" cy="47" r="1" fill="#f43f5e"/>
      <circle cx="${50+rx-16}" cy="40" r="1" fill="#f43f5e"/>
    </svg>`;
  }
  if(tipo==='triangular'){
    const hwRatio=Math.min(1,Math.max(0.3,h/(w*0.6)));
    const apexY=85-55*hwRatio, baseX1=8, baseX2=92;
    const midX=(baseX1+baseX2)/2;
    return `<svg style="width:12rem;height:12rem;color:#06b6d4" viewBox="${viewBox}" fill="none">
      ${base}
      <polygon points="${baseX1},85 ${midX},${apexY} ${baseX2},85" stroke="#06b6d4" stroke-width="2" fill="rgba(6,182,212,0.08)"/>
      <line x1="${midX-7}" y1="${apexY+8}" x2="${midX+7}" y2="${apexY+8}" stroke="#64748b" stroke-width="1" stroke-dasharray="1"/>
      <line x1="${midX}" y1="${apexY}" x2="${midX}" y2="85" stroke="#64748b" stroke-width="1" stroke-dasharray="2"/>
      <text x="50" y="${apexY-3}" text-anchor="middle" fill="#22d3ee" font-size="6">h=${h}m</text>
      <text x="50" y="97" text-anchor="middle" fill="#64748b" font-size="5">L=${w}m</text>
      <circle cx="${midX-10}" cy="${apexY+10}" r="1.2" fill="#f43f5e"/>
      <circle cx="${midX+10}" cy="${apexY+10}" r="1.2" fill="#f43f5e"/>
      <circle cx="${midX-18}" cy="${apexY+20}" r="1.2" fill="#f43f5e"/>
      <circle cx="${midX+18}" cy="${apexY+20}" r="1.2" fill="#f43f5e"/>
    </svg>`;
  }
  const colH=Math.min(55,Math.max(25,80-h/w*20));
  const roofH=colH-20;
  const mid=50;
  return `<svg style="width:12rem;height:12rem;color:#06b6d4" viewBox="${viewBox}" fill="none">
    ${base}
    <rect x="18" y="45" width="64" height="40" rx="1" fill="rgba(6,182,212,0.06)" stroke="none"/>
    <line x1="18" y1="${colH}" x2="18" y2="85" stroke="#06b6d4" stroke-width="2"/>
    <line x1="82" y1="${colH}" x2="82" y2="85" stroke="#06b6d4" stroke-width="2"/>
    <line x1="18" y1="${colH}" x2="50" y2="${roofH}" stroke="#06b6d4" stroke-width="2"/>
    <line x1="82" y1="${colH}" x2="50" y2="${roofH}" stroke="#06b6d4" stroke-width="2"/>
    <line x1="8" y1="85" x2="92" y2="85" stroke="#64748b" stroke-width="1" stroke-dasharray="2"/>
    <text x="50" y="${roofH-4}" text-anchor="middle" fill="#22d3ee" font-size="6">h=${h}m</text>
    <text x="50" y="97" text-anchor="middle" fill="#64748b" font-size="5">L=${w}m</text>
    <circle cx="28" cy="${colH-5}" r="1.2" fill="#f43f5e"/>
    <circle cx="38" cy="${roofH+3}" r="1.2" fill="#f43f5e"/>
    <circle cx="62" cy="${roofH+3}" r="1.2" fill="#f43f5e"/>
    <circle cx="72" cy="${colH-5}" r="1.2" fill="#f43f5e"/>
  </svg>`;
}

      ${c.fields.map((f,i)=>{
        const val = f.path.reduce((o,p)=>o[p],databaseMateriais[c.key]);
        return `<div class="db-edit-row">
          <span>${f.label}</span>
          <input type="number" step="0.01" data-db-path="${c.key}.${f.path.join('.')}" value="${val}">
          <span style="text-align:right;color:#34d399">R$</span>
        </div>`;
      }).join('')}
    </div>`).join('')}
  </div>
  <div style="margin-top:1.5rem;display:flex;gap:.75rem;align-items:center">
    <button class="btn-cyan" style="padding:.5rem 1.5rem;font-size:.75rem" data-db-save>${icon('Database')} Salvar Todas as Alterações</button>
    <span style="font-size:10px;color:#64748b">Os dados persistem enquanto a página estiver aberta.</span>
  </div>
</div>`;
}
function catIcon(k){
  const m={'concreto':'🏗️','aco':'🔩','madeira':'🪵','aluminio':'🪶','pvc':'🔧','vidro':'🪟'};
  return m[k]||'📦';
}
function bindEvents(){
  // Nav tabs
  document.querySelectorAll('[data-tab]').forEach(b=>b.addEventListener('click',()=>{S.activeTab=b.dataset.tab;render();}));

  // Theme buttons
  document.querySelectorAll('[data-theme-btn]').forEach(b=>b.addEventListener('click',function(){S.theme=this.dataset.themeBtn;render();}));

  // Database editor save
  document.querySelectorAll('[data-db-save]').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('[data-db-path]').forEach(inp=>{
      const path=inp.dataset.dbPath.split('.');
      const key=path.shift();
      let obj=databaseMateriais[key];
      for(let i=0;i<path.length-1;i++) obj=obj[path[i]];
      obj[path[path.length-1]]=parseFloat(inp.value)||0;
    });
    S.activeTab='arch';
    render();
  }));

  // Edit panel
  document.querySelectorAll('[data-edit-toggle]').forEach(b=>b.addEventListener('click',()=>{S.isQuickEditOpen=!S.isQuickEditOpen;render();}));
  document.querySelectorAll('[data-close-edit],[data-save-edit]').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('[data-field]').forEach(inp=>{S.projectInfo[inp.dataset.field]=inp.value;});
    S.isQuickEditOpen=false;render();
  }));

  // Delete element
  document.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',()=>{S.calcElements=S.calcElements.filter(e=>e.id!==b.dataset.del);render();}));

  // Add to pool
  document.querySelectorAll('[data-add]').forEach(b=>b.addEventListener('click',()=>{
    S.calcElements.push({id:b.dataset.add.toLowerCase()+'-'+Date.now(),name:b.dataset.name,type:b.dataset.add,concreteVol:parseFloat(b.dataset.cv),steelWeight:parseFloat(b.dataset.sw),note:'Adicionado via Módulo Calculadoras ('+b.dataset.add+')'});
    S.activeTab='project';render();
  }));

  // Calculator sub-tabs
  document.querySelectorAll('[data-sub-tab]').forEach(b=>b.addEventListener('click',()=>{S.calcSubTab=b.dataset.subTab;render();}));

  // Export: Copy
  document.querySelectorAll('[data-copy]').forEach(b=>b.addEventListener('click',()=>exportCopy(b.dataset.copy,b.dataset.copy)));

    const el = document.querySelector('.ia-suggestion');
    if(!el) return;
    const txt = Array.from(el.querySelectorAll('p')).map(p=>p.textContent.trim()).join('\n');
    navigator.clipboard.writeText(txt).then(()=>{b.textContent='Copiado!';setTimeout(()=>{b.innerHTML=icon('Copy')+' Copiar Sugestões'},1500);}).catch(()=>{});
  }));

  // Export: CSV
  document.querySelectorAll('[data-csv]').forEach(b=>b.addEventListener('click',()=>exportCSV(b.dataset.csv,b.dataset.filename||'dados')));

  // Export: PDF/Print
  document.querySelectorAll('[data-pdf]').forEach(b=>b.addEventListener('click',()=>window.print()));
  document.querySelectorAll('[data-pdf-ia]').forEach(b=>b.addEventListener('click',()=>window.print()));

  // IA
  document.querySelectorAll('[data-ia-input]').forEach(el=>el.addEventListener('input',function(){S.iaInput=this.value;}));
  document.querySelectorAll('[data-ia-process]').forEach(b=>b.addEventListener('click',processIA));

  // Live calc inputs - existing
  document.querySelectorAll('[data-sp-load]').forEach(el=>el.addEventListener('input',function(){S.sapataParams.load=parseFloat(this.value)||0;render();}));

  document.querySelectorAll('[data-pn-area]').forEach(el=>el.addEventListener('input',function(){S.pinturaParams.area=parseFloat(this.value)||0;render();}));

  // Edit panel fields live
  document.querySelectorAll('.edit-grid [data-field]').forEach(inp=>inp.addEventListener('input',function(){S.projectInfo[this.dataset.field]=this.value;}));
